<style>
        body { 
            font-family: 'Inter', 'Noto Sans TC', sans-serif; 
            background: #f7f9fb;
            min-height: 100vh;
            color: #1e293b;
            -webkit-tap-highlight-color: transparent;
        }
        .font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        .signature-glow {
            box-shadow: 0 8px 24px rgba(230, 57, 70, 0.15);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .bottom-sheet {
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.08);
        }

        .edit-active-bg {
            background: #E63946 !important;
            color: white !important;
            box-shadow: 0 4px 12px rgba(230, 57, 70, 0.3);
        }

        .delete-fav-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 24px;
            height: 24px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 800;
            z-index: 50;
            border: 2px solid white;
            box-shadow: 0 2px 8px rgba(239, 68, 68, 0.3);
        }
        
        .toast {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(30, 41, 59, 0.95);
            color: white;
            padding: 12px 24px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 700;
            z-index: 200;
            opacity: 0;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .mtr-line-btn {
            @apply flex flex-col items-center justify-center p-4 rounded-2xl bg-white shadow-sm border border-gray-100 transition-all active:scale-95;
        }
        
        @media screen and (max-width: 768px) {
            input, textarea { font-size: 16px !important; }
        }
    </style>
</head>
<body class="pb-32 overflow-x-hidden">
<!-- Top Nav Bar -->
<header class="fixed top-0 w-full z-50 glass shadow-sm px-6 py-4 flex justify-between items-center">
<div class="flex items-center gap-3">
<div class="bg-brand-red p-2 rounded-xl signature-glow">
<span class="material-symbols-outlined text-white text-xl">directions_bus</span>
</div>
<div>
<h1 class="text-xl font-extrabold font-headline tracking-tight text-gray-900 leading-none">HK<span class="text-brand-red">.ETA</span></h1>
<p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mt-1">V7.7.1 STABLE</p>
</div>
</div>
<div class="flex items-center gap-2">
<button class="px-4 py-2 bg-white border border-gray-100 rounded-full text-xs font-bold text-gray-500 shadow-sm active:scale-95 transition-all" id="editToggleBtn" onclick="toggleEditMode()">
<span id="editToggleText">編輯排序</span>
</button>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-white shadow-sm border border-gray-100 text-gray-400 active:bg-gray-50" onclick="toggleSyncPanel()">
<span class="material-symbols-outlined text-xl">sync_alt</span>
</button>
</div>
</header>
<main class="max-w-md mx-auto p-6 pt-24 space-y-8">
<!-- Mode Switcher -->
<div class="relative flex glass p-1.5 rounded-2xl shadow-sm border border-white/60">
<button class="relative z-10 flex-1 py-3.5 rounded-xl font-bold font-headline text-xs transition-all text-white" id="mode-bus" onclick="setMode('bus')">巴士 KMB</button>
<button class="relative z-10 flex-1 py-3.5 rounded-xl font-bold font-headline text-xs transition-all text-gray-400" id="mode-mtr" onclick="setMode('mtr')">地鐵 MTR</button>
<div class="absolute top-1.5 left-1.5 bottom-1.5 w-[calc(50%-6px)] bg-brand-red rounded-xl transition-all duration-300 shadow-md" id="mode-bg"></div>
</div>
<!-- Sync Panel -->
<div class="hidden glass rounded-3xl p-6 shadow-xl border border-white/60" id="syncPanel">
<h3 class="font-bold font-headline text-gray-800 mb-2">雲端同步 ID</h3>
<p class="text-[11px] text-gray-500 mb-4">將此 ID 抄到其他裝置即可同步收藏</p>
<div class="space-y-4">
<input class="w-full bg-white/50 p-4 rounded-xl border border-gray-100 text-xs font-mono text-gray-500 select-all" id="userIdDisplay" readonly="" type="text"/>
<div class="flex gap-2">
<input class="flex-1 bg-white border border-gray-100 rounded-xl px-5 py-3 text-xs font-mono outline-none focus:ring-2 ring-brand-red/10" id="userIdInput" placeholder="貼上 ID 同步" type="text"/>
<button class="bg-gray-900 text-white text-[11px] px-6 rounded-xl font-bold active:scale-95 transition-all" onclick="manualSync()">同步</button>
</div>
</div>
</div>
<!-- Favorites Section -->
<div class="hidden" id="favoritesSection">
<div class="flex justify-between items-center mb-4 px-1">
<h2 class="text-[11px] font-bold text-gray-400 uppercase tracking-widest">常用路線 ⭐</h2>
<div class="text-[9px] font-bold text-brand-red hidden" id="favLoadingStatus">更新中...</div>
</div>
<div class="flex gap-4 overflow-x-auto pb-4 no-scrollbar snap-x relative min-h-[140px]" id="favoritesList"></div>
</div>
<!-- Search Section -->
<div id="busSearchSection">
<div class="glass rounded-3xl p-3 shadow-xl border border-white/60 flex items-center gap-3 h-20">
<div class="pl-4">
<span class="material-symbols-outlined text-gray-400">search</span>
</div>
<input class="flex-1 min-w-0 bg-transparent font-bold font-headline text-xl text-gray-800 outline-none placeholder:text-gray-300" id="routeInput" onkeypress="if(event.key === 'Enter') searchRoute()" placeholder="輸入路線 (e.g. 290)" type="text"/>
<button class="bg-brand-red text-white w-12 h-12 rounded-2xl flex items-center justify-center signature-glow active:scale-90 transition-all" onclick="searchRoute()">
<span class="material-symbols-outlined font-bold">arrow_forward</span>
</button>
</div>
</div>
<!-- MTR Lines Grid -->
<div class="hidden space-y-4" id="mtrLineSection">
<h2 class="text-[11px] text-gray-400 font-bold px-1 uppercase tracking-widest">地鐵網絡 MTR</h2>
<div class="grid grid-cols-2 gap-4" id="mtrLines"></div>
</div>
<!-- Status Box -->
<div class="hidden text-center py-16 glass rounded-3xl shadow-xl" id="statusBox">
<div class="animate-spin rounded-full h-10 w-10 border-b-2 border-brand-red border-t-transparent mx-auto mb-4"></div>
<p class="text-gray-400 font-bold text-sm" id="statusText"></p>
</div>
<!-- Directions Section -->
<div class="hidden space-y-4" id="directionSection"></div>
<!-- Stop List Section -->
<div class="hidden space-y-6" id="stopListSection">
<div class="flex justify-between items-center px-1">
<h2 class="font-extrabold font-headline text-gray-900 text-2xl tracking-tight" id="stopListTitle">車站清單</h2>
<button class="bg-white text-gray-400 text-[10px] font-bold uppercase px-4 py-2 rounded-full shadow-sm border border-gray-100 active:bg-gray-50" onclick="resetApp()">返回</button>
</div>
<div class="space-y-3" id="stopList"></div>
</div>
</main>
<!-- Detailed ETA Bottom Sheet -->
<div class="hidden fixed inset-0 z-[100] flex items-end justify-center" id="etaModal">
<div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity" onclick="closeModal()"></div>
<div class="relative bg-white w-full max-w-md rounded-t-[3rem] bottom-sheet overflow-hidden flex flex-col max-h-[90vh]">
<!-- Pull Handle -->
<div class="w-full flex justify-center py-4 shrink-0">
<div class="w-12 h-1.5 bg-gray-200 rounded-full"></div>
</div>
<div class="px-8 pb-6 border-b border-gray-50 shrink-0" id="modalHeader">
<div class="flex justify-between items-start">
<div>
<div class="flex items-center gap-2 mb-2">
<span class="text-4xl font-extrabold font-headline text-brand-red leading-none" id="modalRouteName">---</span>
<span class="bg-brand-red/10 text-brand-red px-2.5 py-1 rounded-full text-[10px] font-bold uppercase">即時更新</span>
</div>
<h3 class="text-xl font-bold text-gray-800 leading-tight" id="modalStopName">---</h3>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-50 text-gray-400 active:scale-90 transition-all" onclick="closeModal()">
<span class="material-symbols-outlined">close</span>
</button>
</div>
</div>
<div class="px-8 py-6 space-y-4 overflow-y-auto no-scrollbar flex-1" id="etaContent"></div>
<div class="p-8 bg-white border-t border-gray-50 shrink-0">
<button class="w-full py-4 bg-gray-900 text-white rounded-2xl font-bold font-headline text-sm shadow-lg active:scale-95 transition-all" onclick="closeModal()">關閉</button>
</div>
</div>
</div>
<!-- Bottom Nav Bar -->
<nav class="fixed bottom-0 w-full z-50 glass rounded-t-3xl shadow-[0_-4px_24px_rgba(0,0,0,0.05)] border-t-0">
<div class="flex justify-around items-center px-6 pb-8 pt-4 w-full">
<button class="flex flex-col items-center gap-1 text-brand-red group" onclick="setMode('bus')">
<div class="p-2 rounded-xl group-active:scale-90 transition-transform bg-brand-red/5">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">directions_bus</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-wider">巴士</span>
</button>
<button class="flex flex-col items-center gap-1 text-gray-400 group" onclick="setMode('mtr')">
<div class="p-2 rounded-xl group-active:scale-90 transition-transform">
<span class="material-symbols-outlined">train</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-wider">地鐵</span>
</button>
<button class="flex flex-col items-center gap-1 text-gray-400 group">
<div class="p-2 rounded-xl group-active:scale-90 transition-transform">
<span class="material-symbols-outlined">star</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-wider">收藏</span>
</button>
<button class="flex flex-col items-center gap-1 text-gray-400 group">
<div class="p-2 rounded-xl group-active:scale-90 transition-transform">
<span class="material-symbols-outlined">settings</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-wider">設定</span>
</button>
</div>
</nav>
<div class="toast" id="toast"></div>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script>
        // --- DATA HANDLING LOGIC (ORIGINAL) ---
        // Placeholder for firebase configuration - user must replace with their own
        const firebaseConfig = { apiKey: "AIza...", authDomain: "...", projectId: "...", storageBucket: "...", messagingSenderId: "...", appId: "..." };
        // firebase.initializeApp(firebaseConfig); 
        // const db = firebase.firestore();
        // const auth = firebase.auth();

        let currentMode = 'bus';
        let isEditMode = false;
        let favorites = JSON.parse(localStorage.getItem('hk_eta_favorites') || '[]');
        let userId = localStorage.getItem('hk_eta_user_id') || 'USER_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('hk_eta_user_id', userId);

        const mtrLines = {
            'AEL': { name: '機場快綫', color: '#007078' },
            'TCL': { name: '東涌綫', color: '#f7943e' },
            'TML': { name: '屯馬綫', color: '#9a3820' },
            'EAL': { name: '東鐵綫', color: '#5ebcb9' },
            'SIL': { name: '南港島綫', color: '#b5bd00' },
            'TKL': { name: '將軍澳綫', color: '#a35eb5' },
            'DRL': { name: '迪士尼綫', color: '#f5808b' },
            'KTL': { name: '觀塘綫', color: '#00ab4e' },
            'ISL': { name: '港島綫', color: '#0071ce' },
            'TWL': { name: '荃灣綫', color: '#f62e11' }
        };

        // UI Transition Functions
        function setMode(mode) {
            currentMode = mode;
            const bg = document.getElementById('mode-bg');
            const busBtn = document.getElementById('mode-bus');
            const mtrBtn = document.getElementById('mode-mtr');
            const busSection = document.getElementById('busSearchSection');
            const mtrSection = document.getElementById('mtrLineSection');
            
            if (mode === 'bus') {
                bg.style.left = '1.5px';
                bg.style.backgroundColor = '#E63946';
                busBtn.classList.add('text-white');
                busBtn.classList.remove('text-gray-400');
                mtrBtn.classList.add('text-gray-400');
                mtrBtn.classList.remove('text-white');
                busSection.classList.remove('hidden');
                mtrSection.classList.add('hidden');
            } else {
                bg.style.left = 'calc(50% + 1.5px)';
                bg.style.backgroundColor = '#3b82f6';
                mtrBtn.classList.add('text-white');
                mtrBtn.classList.remove('text-gray-400');
                busBtn.classList.add('text-gray-400');
                busBtn.classList.remove('text-white');
                busSection.classList.add('hidden');
                mtrSection.classList.remove('hidden');
                renderMtrLines();
            }
            resetApp();
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            document.getElementById('editToggleBtn').classList.toggle('edit-active-bg');
            document.getElementById('editToggleText').innerText = isEditMode ? '完成排序' : '編輯排序';
            renderFavorites();
        }

        function toggleSyncPanel() {
            const panel = document.getElementById('syncPanel');
            panel.classList.toggle('hidden');
            document.getElementById('userIdDisplay').value = userId;
        }

        // Search & Fetch Logic
        async function apiFetch(url) {
            try {
                const res = await fetch(url);
                return await res.json();
            } catch (e) {
                showToast("網絡錯誤，請稍後再試");
                return null;
            }
        }

        async function searchRoute() {
            const route = document.getElementById('routeInput').value.trim().toUpperCase();
            if (!route) return;
            
            showStatus("正在搜尋路線...");
            const data = await apiFetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${route}/outbound`);
            
            if (!data || !data.data.length) {
                showStatus("找不到路線，請檢查輸入。");
                return;
            }
            
            hideStatus();
            renderDirections(route);
        }

        function renderDirections(route) {
            const container = document.getElementById('directionSection');
            container.innerHTML = `
                <div class="glass p-6 rounded-3xl shadow-lg border border-white/60">
                    <h3 class="font-bold text-gray-400 text-[10px] uppercase tracking-widest mb-4">選擇方向</h3>
                    <div class="space-y-3">
                        <button onclick="fetchStops('${route}', 'outbound')" class="w-full py-4 px-6 bg-white border border-gray-100 rounded-2xl font-bold text-left flex justify-between items-center active:bg-gray-50 transition-all">
                            <span>往目的地 (去程)</span>
                            <span class="material-symbols-outlined text-gray-300">chevron_right</span>
                        </button>
                        <button onclick="fetchStops('${route}', 'inbound')" class="w-full py-4 px-6 bg-white border border-gray-100 rounded-2xl font-bold text-left flex justify-between items-center active:bg-gray-50 transition-all">
                            <span>往目的地 (回程)</span>
                            <span class="material-symbols-outlined text-gray-300">chevron_right</span>
                        </button>
                    </div>
                </div>
            `;
            container.classList.remove('hidden');
        }

        async function fetchStops(route, dir) {
            showStatus("讀取車站中...");
            const [stopData, nameData] = await Promise.all([
                apiFetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${route}/${dir}`),
                apiFetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop`)
            ]);
            
            if (!stopData || !nameData) return;
            
            const names = nameData.data.reduce((acc, s) => { acc[s.stop] = s.name_tc; return acc; }, {});
            const stops = stopData.data.map(s => ({ id: s.stop, name: names[s.stop] || s.stop }));
            
            hideStatus();
            document.getElementById('directionSection').classList.add('hidden');
            document.getElementById('busSearchSection').classList.add('hidden');
            renderStopList(route, dir, stops);
        }

        function renderStopList(route, dir, stops) {
            const container = document.getElementById('stopList');
            document.getElementById('stopListTitle').innerText = `${route} 車站`;
            container.innerHTML = stops.map((s, idx) => `
                <div onclick="showETA('${route}', '${dir}', '${s.id}', '${s.name}')" class="bg-white p-5 rounded-2xl shadow-sm border border-gray-50 flex items-center gap-4 active:scale-[0.98] transition-all">
                    <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-[10px] font-bold text-slate-400 shrink-0">${idx+1}</div>
                    <span class="font-bold text-gray-800">${s.name}</span>
                </div>
            `).join('');
            document.getElementById('stopListSection').classList.remove('hidden');
        }

        async function showETA(route, dir, stopId, stopName) {
            const modal = document.getElementById('etaModal');
            const content = document.getElementById('etaContent');
            const routeNameEl = document.getElementById('modalRouteName');
            const stopNameEl = document.getElementById('modalStopName');
            
            routeNameEl.innerText = route;
            stopNameEl.innerText = stopName;
            content.innerHTML = '<div class="flex justify-center py-10"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-brand-red border-t-transparent"></div></div>';
            
            modal.classList.remove('hidden');
            
            const data = await apiFetch(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${stopId}/${route}/1`);
            
            if (!data || !data.data.length) {
                content.innerHTML = '<p class="text-center py-10 text-gray-400 font-bold">暫無預計抵達時間</p>';
            } else {
                content.innerHTML = data.data
                    .filter(e => e.dir === (dir === 'outbound' ? 'O' : 'I'))
                    .map(e => {
                        const time = e.eta ? new Date(e.eta).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '--:--';
                        const diff = e.eta ? Math.max(0, Math.floor((new Date(e.eta) - new Date()) / 60000)) : null;
                        return `
                        <div class="bg-surface-container-low p-6 rounded-2xl flex items-center justify-between border border-gray-50">
                            <div>
                                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">${e.dest_tc}</span>
                                <p class="text-[10px] text-gray-400 mt-1 uppercase">預計 ${time}</p>
                            </div>
                            <div class="text-right">
                                <div class="inline-flex items-center ${diff !== null && diff <= 5 ? 'bg-brand-red' : 'bg-gray-100'} px-4 py-2 rounded-full ${diff !== null && diff <= 5 ? 'text-white' : 'text-gray-800'} font-bold gap-2 signature-glow">
                                    <span class="text-xl">${diff !== null ? diff : '--'}</span>
                                    <span class="text-[10px] uppercase tracking-tighter">min</span>
                                </div>
                            </div>
                        </div>`;
                    }).join('');
            }
            
            const btnHtml = favorites.some(f => f.route === route && f.stopId === stopId) 
                ? `<button onclick="removeFavorite('${route}', '${stopId}')" class="w-full mt-4 py-4 bg-gray-100 text-gray-500 rounded-2xl font-bold text-sm transition-all">移除收藏</button>`
                : `<button onclick="addFavorite('${route}', '${dir}', '${stopId}', '${stopName}')" class="w-full mt-4 py-4 bg-brand-red/10 text-brand-red rounded-2xl font-bold text-sm transition-all">加入常用</button>`;
            
            content.innerHTML += btnHtml;
        }

        // Favorites Logic
        function addFavorite(route, dir, stopId, stopName) {
            if (!favorites.some(f => f.route === route && f.stopId === stopId)) {
                favorites.push({ route, dir, stopId, stopName, id: Date.now() });
                localStorage.setItem('hk_eta_favorites', JSON.stringify(favorites));
                renderFavorites();
                showToast("已加入收藏");
                closeModal();
            }
        }

        function removeFavorite(route, stopId) {
            favorites = favorites.filter(f => !(f.route === route && f.stopId === stopId));
            localStorage.setItem('hk_eta_favorites', JSON.stringify(favorites));
            renderFavorites();
            showToast("已從收藏移除");
            closeModal();
        }

        function renderFavorites() {
            const section = document.getElementById('favoritesSection');
            const list = document.getElementById('favoritesList');
            
            if (favorites.length === 0) {
                section.classList.add('hidden');
                return;
            }
            
            section.classList.remove('hidden');
            list.innerHTML = favorites.map(f => `
                <div class="flex-shrink-0 w-40 relative snap-start">
                    ${isEditMode ? `<div class="delete-fav-badge" onclick="event.stopPropagation(); removeFavorite('${f.route}', '${f.stopId}')">×</div>` : ''}
                    <div onclick="showETA('${f.route}', '${f.dir}', '${f.stopId}', '${f.stopName}')" class="glass p-5 rounded-3xl border border-white/60 h-full flex flex-col justify-between active:scale-95 transition-all shadow-sm">
                        <div>
                            <span class="text-3xl font-black font-headline text-brand-red">${f.route}</span>
                            <p class="text-[10px] font-bold text-gray-500 line-clamp-2 mt-1">${f.stopName}</p>
                        </div>
                        <div class="mt-4 flex items-center justify-between text-[10px] font-black text-gray-300">
                            <span>TAP FOR ETA</span>
                            <span class="material-symbols-outlined text-xs">arrow_forward</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // MTR Logic
        function renderMtrLines() {
            const container = document.getElementById('mtrLines');
            container.innerHTML = Object.entries(mtrLines).map(([code, data]) => `
                <button onclick="showMtrETA('${code}', '${data.name}')" class="mtr-line-btn border-b-4" style="border-bottom-color: ${data.color}">
                    <div class="w-10 h-10 rounded-full flex items-center justify-center mb-2" style="background-color: ${data.color}15">
                        <span class="material-symbols-outlined" style="color: ${data.color}; font-variation-settings: 'FILL' 1;">train</span>
                    </div>
                    <span class="text-[10px] font-bold uppercase text-gray-500 tracking-wider">${data.name}</span>
                </button>
            `).join('');
        }

        async function showMtrETA(lineCode, lineName) {
            showToast(`功能暫未完全開放 (${lineName})`);
        }

        // Global Helpers
        function showStatus(text) {
            const box = document.getElementById('statusBox');
            document.getElementById('statusText').innerText = text;
            box.classList.remove('hidden');
        }

        function hideStatus() {
            document.getElementById('statusBox').classList.add('hidden');
        }

        function resetApp() {
            document.getElementById('directionSection').classList.add('hidden');
            document.getElementById('stopListSection').classList.add('hidden');
            document.getElementById('busSearchSection').classList.remove('hidden');
            hideStatus();
        }

        function closeModal() {
            const modal = document.getElementById('etaModal');
            modal.classList.add('hidden');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Init
        renderFavorites();
        if (currentMode === 'bus') setMode('bus');
    </script>
</body></html>
